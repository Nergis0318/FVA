name: Release

on:
  release:
    types: [prereleased]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-32vcpu-ubuntu-2404
            target: x86_64-unknown-linux-musl
            artifact_name: fva-linux-amd64
            archive_ext: tar.gz
          - os: blacksmith-32vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-musl
            artifact_name: fva-linux-arm64
            archive_ext: tar.gz
          - os: blacksmith-32vcpu-ubuntu-2404
            target: x86_64-pc-windows-msvc
            artifact_name: fva-windows-amd64
            archive_ext: zip
          # - os: blacksmith-32vcpu-ubuntu-2404-arm
          #   target: aarch64-pc-windows-msvc
          #   artifact_name: fva-windows-arm64
          #   archive_ext: zip
          - os: blacksmith-12vcpu-macos-latest
            target: aarch64-apple-darwin
            artifact_name: fva-macos-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install sccache
        run: cargo binstall sccache

      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install protobuf-compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install clang/LLVM (Windows cross)
        if: contains(matrix.target, 'windows-msvc')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld
          LLVM_BIN="$(dirname "$(ls /usr/lib/llvm-*/bin/llvm-lib | head -1)")"
          echo "${LLVM_BIN}" >> "$GITHUB_PATH"

      - name: Install cargo-xwin
        if: contains(matrix.target, 'windows-msvc')
        run: cargo binstall cargo-xwin --locked

      - name: Install protobuf-compiler (macos)
        if: contains(matrix.target, 'apple-darwin')
        run: brew install protobuf

      - name: Cache sccache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/sccache
          key: ${{ runner.os }}-sccache-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-${{ matrix.target }}-

      - name: Build
        if: ${{ !contains(matrix.target, 'windows-msvc') }}
        run: cargo build --release --all-features --target ${{ matrix.target }}
        env:
          SCCACHE_DIR: ${{ runner.temp }}/sccache

      - name: Build (Windows cross)
        if: contains(matrix.target, 'windows-msvc')
        run: cargo xwin build --release --all-features --target ${{ matrix.target }}
        env:
          SCCACHE_DIR: ${{ runner.temp }}/sccache

      - name: sccache stats
        if: always()
        run: sccache --show-stats
        env:
          SCCACHE_DIR: ${{ runner.temp }}/sccache

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mkdir -p dist
          tar czf "dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" \
            -C "target/${{ matrix.target }}/release" fva

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        run: |
          mkdir -p dist
          zip -j "dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" \
            "target/${{ matrix.target }}/release/fva.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum fva-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

      - name: Promote to latest release
        run: gh release edit "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --prerelease=false --latest
        env:
          GH_TOKEN: ${{ github.token }}
