name: Release

on:
  release:
    types: [prereleased]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: fva-linux-amd64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: fva-linux-arm64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fva-windows-amd64
            archive_ext: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: fva-windows-arm64
            archive_ext: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fva-macos-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install protobuf-compiler
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf-compiler (windows)
        if: contains(matrix.target, 'windows-msvc')
        run: winget install protobuf --accept-source-agreements --accept-package-agreements

      - name: Install protobuf-compiler (macos)
        if: contains(matrix.target, 'apple-darwin')
        run: brew install protobuf -y

      - name: Build
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar czf "dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" \
            -C "target/${{ matrix.target }}/release" fva

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target\${{ matrix.target }}\release\fva.exe"
          Compress-Archive -Path $bin -DestinationPath "dist\${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum fva-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

      - name: Promote to latest release
        run: gh release edit "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --prerelease=false --latest
        env:
          GH_TOKEN: ${{ github.token }}
